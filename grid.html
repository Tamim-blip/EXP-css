<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid layout</title>
    <style>
        .container{
            display:grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }
        .box{
            border: 2px solid salmon;
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <div class="container">
               <div class="box">box-11</div>
               <div class="box">box-21</div>
               <div class="box">box-31</div>
               <div class="box">box-41</div>
               <div class="box">box-51</div>
               <div class="box">box-61</div>
               <div class="box">box-71</div>
               <div class="box">box-81</div>
               <div class="box">box-91</div>
               <div class="box">box-101</div>
               <div class="box">box-111</div>
               <div class="box">box-121</div>
               <div class="box">box-131</div>
               <div class="box">box-141</div>
               <div class="box">box-151</div>
               <div class="box">box-161</div>
               <div class="box">box-171</div>
               <div class="box">box-181</div>
               <div class="box">box-191</div>
               <div class="box">box-201</div>
               <div class="box">box-211</div>
            </div>
        </section>
    </main>
    
</body>
</html>
