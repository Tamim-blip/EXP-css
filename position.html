<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        img{
            height: 150px;
            width: 150px;
           
        }
        .container div{
            border: dotted rebeccapurple;
            width: 200px;
            display: flex;
             justify-content: center;
             align-items: center;
           
        }
         .ring{
            position: relative;
            top: 0px;
            left: 230px;

        } 





    


        .containers{
            padding: 30px;
            
        }
        .containers div{
            border: 3px solid red;
            width: 150px;
           
        }
        .rings{
            position: absolute;
            left: 200px;
            bottom:-120px;
        }
         .waters{
            position: relative;
            bottom: -20px;
         }






         .containeres div{
            border: 3px dotted blue;
            width: 150px;

        
         }
         .ringes{
            position:sticky;
            left: 300px;
            top:-100px
            
         }
         .boxes{
            height: 150px;
         }

    </style>
</head>
<body>
    <main>
        <ul>
            <li>static</li>
            <li>realitive</li>
            <li>absolute</li>
            <li>sticky</li>
            <li>fixed</li>
        </ul>
        <div class="container">
            <div class="boy"><img src="ring.jpeg" alt="boy"></div>
            <div class="ring"><img src="ring.jpeg" alt="ring"></div>
            <div class="water"><img src="ring.jpeg" alt="water"></div>
        </div>
         
         <div class="containers">
            <div class="boys"><img src="ring.jpeg" alt="boy"></div>
            <div class="rings"><img src="ring.jpeg" alt="ring"></div>
            <div class="waters"><img src="ring.jpeg" alt="water"></div>
        </div>   
        <div class="containeres">
            <div class="boyes"><img src="ring.jpeg" alt="boy"></div>
            <div class="ringes"><img src="ring.jpeg" alt="ring"></div>
            <div class="wateres"><img src="ring.jpeg" alt="water"></div>
            <div class="boxes">box-1</div>
            <div class="boxes">box-2</div>
            <div class="boxes">box-3</div>
            <div class="boxes">box-4</div>
            <div class="boxes">box-5</div>
            <div class="boxes">box-6</div>
            <div class="boxes">box-7</div>
            <div class="boxes">box-8</div>
            <div class="boxes">box-9</div>
            <div class="boxes">box-10</div>
            <div class="boxes">box-11</div>
            <div class="boxes">box-12</div>
            <div class="boxes">box-13</div>
            <div class="boxes">box-14</div>
            <div class="boxes">box-15</div>
            <div class="boxes">box-16</div>
            <div class="boxes">box-17</div>
            <div class="boxes">box-18</div>
            <div class="boxes">box-19</div>
            <div class="boxes">box-20</div>
        </div>                 
    </main>
    
</body>
</html>
